name: Build Distributables

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows
          # - os: ubuntu-latest
          #   name: Linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set VERSION
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "VERSION=dev" >> $GITHUB_ENV
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Cache BirdNET checkpoints
        uses: actions/cache@v4
        with:
          path: packaging/.birdnet-checkpoints
          key: birdnet-checkpoints-${{ hashFiles('2-analyze-pam-recordings.py.lock') }}

      - name: Build distributables
        run: uv run --script packaging/build.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.name }}
          path: packaging/dist/
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd packaging/dist
          if [[ "${{ matrix.name }}" == "macOS" ]]; then
            for app in *.app; do
              versioned="${app%.app}-${VERSION}-macOS.zip"
              zip -r "$versioned" "$app"
              gh release upload "${{ github.ref_name }}" "$versioned" --clobber
            done
          elif [[ "${{ matrix.name }}" == "Windows" ]]; then
            for exe in *.exe; do
              versioned="${exe%.exe}-${VERSION}-windows-x86_64.exe"
              mv "$exe" "$versioned"
              gh release upload "${{ github.ref_name }}" "$versioned" --clobber
            done
          else
            for f in *; do
              versioned="${f}-${VERSION}-Linux"
              [[ -f "$f" ]] && mv "$f" "$versioned" && gh release upload "${{ github.ref_name }}" "$versioned" --clobber
            done
          fi
